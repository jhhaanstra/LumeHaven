version: '3.8'

services:
  ghs-server:
    image: gloomhavensecretariat/ghs-server
    ports:
      - "12345:8080"
    volumes:
      - ./ghs:/root/.ghs
  lumehaven:
    image: jhhaanstra/lumehaven
    ports:
      - "5000:5000"
    volumes:
      - ./config.yml:/lumehaven/config.yml
      - ./ghs:/lumehaven/ghs